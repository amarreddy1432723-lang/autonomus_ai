name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: my_ai_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d my_ai_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: ci
      DATABASE_URL: postgresql+psycopg://postgres:postgrespassword@localhost:5432/my_ai_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret-change-in-production
      APP_ENCRYPTION_KEY: ci-field-encryption-key-change-in-production
      ALLOW_DEMO_USER: "false"
      ALLOW_DEV_AUTH_FALLBACK: "false"
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall services
      - run: python -m alembic upgrade head
      - run: python -m pytest . --ignore=.venv

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_AUTH_URL: http://localhost:8001
      NEXT_PUBLIC_GOALS_URL: http://localhost:8002
      NEXT_PUBLIC_AGENT_URL: http://localhost:8003
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  desktop:
    name: desktop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: node --check main.js
      - run: node --check preload.js
      - run: npm run package -- --dry-run
        continue-on-error: true

  docker-images:
    name: docker-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/arceus-backend:${{ github.sha }}
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/arceus-frontend:${{ github.sha }}

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Python dependency audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
