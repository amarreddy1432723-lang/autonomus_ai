global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/arceus-alerts.yml

scrape_configs:
  - job_name: arceus-auth
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth:8000

  - job_name: arceus-goals
    metrics_path: /metrics
    static_configs:
      - targets:
          - goals:8000

  - job_name: arceus-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - agent:8000
