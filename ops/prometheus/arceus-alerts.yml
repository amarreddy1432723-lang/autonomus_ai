groups:
  - name: arceus-platform
    rules:
      - alert: ArceusApiHighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_requests_total[5m])), 1)
          > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Arceus API 5xx rate is above 1 percent
          description: Check recent deploys, Sentry errors, and service logs.

      - alert: ArceusApiP99LatencyHigh
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, handler))
          > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Arceus API p99 latency is above 3 seconds
          description: Identify slow handlers and check database/Redis saturation.

      - alert: ArceusServiceDown
        expr: up{job=~"arceus-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Arceus service is down
          description: Prometheus cannot scrape {{ $labels.job }}.

      - alert: ArceusWorkerQueueDepthHigh
        expr: arceus_job_queue_depth > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Arceus job queue depth is high
          description: Queue depth is above 100. Scale workers or pause new expensive jobs.

      - alert: ArceusWorkerDown
        expr: arceus_worker_count == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Arceus worker capacity is zero
          description: No worker is available to process agent, check, install, or preview jobs.

      - alert: ArceusDeadLetterJobs
        expr: increase(arceus_dead_letter_jobs_total[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Arceus jobs reached dead-letter state
          description: Inspect durable job records and recent worker logs before accepting more background work.
