services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: my-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: my_ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: my-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-ai-agent-worker
    command: sh -c "python -m playwright install --with-deps chromium || true; celery -A worker.celery_app worker -Q agent_tasks,checks_queue,install_queue --loglevel=INFO"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgrespassword@postgres:5432/my_ai_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_ENABLED: "true"
      AGENT_WORKER_ENABLED: "false"
      SANDBOX_PROVIDER: docker
      SANDBOX_DOCKER_IMAGE: arceus-code-sandbox:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-worker-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-ai-agent-worker-beat
    command: celery -A worker.celery_app beat --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgrespassword@postgres:5432/my_ai_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_ENABLED: "true"
      AGENT_WORKER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-ai-flower
    command: celery -A worker.celery_app flower --port=5555
    profiles: ["monitoring"]
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgrespassword@postgres:5432/my_ai_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  sandbox-image:
    build:
      context: ./backend
      dockerfile: Dockerfile.sandbox
    image: arceus-code-sandbox:local
    profiles: ["sandbox-build"]

volumes:
  postgres_data:
  redis_data:
